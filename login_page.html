<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rahen Azat Institute</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter for the clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for the input icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0F765A', // The dark green color from the button
                        primaryHover: '#0b5944',
                        bgBody: '#F5F6F8', // Light gray background
                        textColor: '#0B1C30',
                        textMuted: '#6B7280',
                        borderColor: '#E5E7EB'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgBody min-h-screen flex items-center justify-center p-4 antialiased text-textColor">

    <!-- Main Card Container -->
    <div class="bg-white rounded-[24px] shadow-sm w-full max-w-2xl px-6 py-12 sm:px-16 sm:py-16 flex flex-col items-center">
        
        <!-- Header with Logo -->
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-[#0F765A] rounded-full flex items-center justify-center shadow-inner border-[6px] border-green-50 ring-1 ring-gray-100">
                <i class="ph ph-book-open text-white text-[32px]"></i>
            </div>
        </div>
        
        <h1 class="text-4xl sm:text-5xl font-bold mb-2 text-center tracking-tight">Login</h1>
        <p class="text-lg text-textMuted mb-10 text-center">RahenazatInstitute</p>

        <!-- Form Area -->
        <form class="w-full max-w-[480px]" onsubmit="event.preventDefault(); alert('Login action triggered');">
            
            <!-- Email Input Group -->
            <div class="mb-6">
                <label for="email" class="block text-[15px] font-semibold mb-2">Email Address</label>
                <div class="relative flex items-center border border-gray-300 rounded-xl focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all duration-200 bg-white overflow-hidden group">
                    <div class="pl-4 pr-3 flex items-center justify-center text-gray-400 group-focus-within:text-gray-600 transition-colors">
                        <i class="ph ph-envelope-simple text-[22px]"></i>
                    </div>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email address" 
                        class="w-full py-3.5 pr-4 outline-none text-[15px] placeholder:text-gray-400 bg-transparent text-gray-800"
                        required
                    >
                </div>
            </div>

            <!-- Password Input Group -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="block text-[15px] font-semibold">Password</label>
                    <a href="#" class="text-sm text-primary font-medium hover:underline">Forgot Password?</a>
                </div>
                <div class="relative flex items-center border border-gray-300 rounded-xl focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all duration-200 bg-white overflow-hidden group">
                    <div class="pl-4 pr-3 flex items-center justify-center text-gray-400 group-focus-within:text-gray-600 transition-colors">
                        <i class="ph ph-lock-key text-[22px]"></i>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        class="w-full py-3.5 outline-none text-[15px] placeholder:text-gray-400 bg-transparent text-gray-800"
                        required
                    >
                    <button type="button" id="togglePassword" class="pr-4 pl-3 flex items-center justify-center text-gray-400 hover:text-gray-600 transition-colors focus:outline-none">
                        <i id="eyeIcon" class="ph ph-eye-slash text-[22px]"></i>
                    </button>
                </div>
            </div>

            <!-- Keep me logged in Checkbox -->
            <div class="mb-8 flex items-center">
                <div class="relative flex items-center">
                    <input 
                        type="checkbox" 
                        id="keepLogged" 
                        class="peer appearance-none w-[20px] h-[20px] border border-gray-400 rounded bg-white checked:bg-primary checked:border-primary cursor-pointer transition-colors"
                    >
                    <i class="ph ph-check absolute text-white text-sm pointer-events-none opacity-0 peer-checked:opacity-100 left-[3px] top-[3px]"></i>
                </div>
                <label for="keepLogged" class="ml-3 text-[15px] font-medium cursor-pointer text-gray-800">Keep me logged in</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-medium py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-sm text-base">
                <i class="ph ph-lock-key text-[20px]"></i>
                Login
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-12 text-center text-[13px] text-textMuted font-medium">
            &copy; 2026 Rahen Azat Institute. All rights reserved.
        </div>

    </div>

    <!-- JavaScript for Password Toggle -->
    <script>
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', function (e) {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the eye icon
            if (type === 'password') {
                eyeIcon.classList.remove('ph-eye');
                eyeIcon.classList.add('ph-eye-slash');
            } else {
                eyeIcon.classList.remove('ph-eye-slash');
                eyeIcon.classList.add('ph-eye');
            }
        });
    </script>
</body>
</html>
