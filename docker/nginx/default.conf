server {
    listen      80;
    server_name _;
    root  /var/www/html/public;
    index index.php index.html;

    # ── Browser cache fix ──────────────────────────────────────────
    # পুরনো config-এ / → /public/ redirect ছিল, browser সেটা cache করেছে।
    # এই block সেই cached /public/... URL গুলোকে সঠিক path-এ পাঠাবে।
    location ^~ /public/ {
        rewrite ^/public/(.*)$ /$1 permanent;
    }
    location = /public {
        return 301 /;
    }

    # ── Static asset caching ──────────────────────────────────────
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webp|map)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── PHP processing ────────────────────────────────────────────
    location ~ \.php$ {
        try_files      $uri =404;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── Default location ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Security: block hidden files ───────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Block PHP in uploads ────────────────────────────────────────
    location /uploads/ {
        location ~ \.php$ { deny all; }
    }

    client_max_body_size 32M;
}